          .miki-marquee-bar { width:100%; background:#111; border-top:1px solid #ffffff; border-bottom:1px solid #ffffff; overflow:hidden; height:36px; display:flex; align-items:center; font-family:'Space Mono','Courier New',monospace; font-size:13px; color:#ccc; letter-spacing:0.04em; }

          .miki-marquee-bar__track { display:flex; align-items:center; white-space:nowrap; will-change:transform; animation:miki-scroll 60s linear infinite; padding-left:60px; }
          .miki-marquee-bar__track:hover { animation-play-state:paused; }
          @keyframes miki-scroll { from{transform:translateX(0)} to{transform:translateX(-50%)} }
          .miki-city { display:inline-flex; align-items:center; gap:10px; white-space:nowrap; }
          .miki-city__flag { font-size:16px; }
          .miki-city__name { color:#e8372a; font-size:10px; font-weight:700; letter-spacing:0.2em; text-transform:uppercase; }
          .miki-city__time { color:#f0ede8; font-size:14px; }
          .miki-city__weather { color:#999; font-size:12px; }
          .miki-family-label { color:#e8372a; font-size:10px; font-weight:700; letter-spacing:0.2em; text-transform:uppercase; white-space:nowrap; }
          .miki-family { display:inline-flex; align-items:center; gap:22px; white-space:nowrap; }
          .miki-family-link { display:inline-flex; align-items:center; }
          .miki-family-logo { height:22px; width:auto; max-width:none; object-fit:contain; display:block; opacity:0.92; }
          .miki-family-logo--soultone { height:31px; }
          .miki-family-link:hover .miki-family-logo { opacity:1; }
          .miki-news-label { color:#e8372a; font-size:10px; font-weight:700; letter-spacing:0.2em; text-transform:uppercase; white-space:nowrap; }
          .miki-news-text { color:#f0ede8; font-size:13px; white-space:nowrap; }
          .miki-divider { display:inline-block; width:1px; height:20px; background:#333; margin:0 32px; vertical-align:middle; flex-shrink:0; }
          .miki-sep { color:#e8372a; margin:0 20px; opacity:0.6; font-size:12px; }

        <div class="miki-marquee-bar" role="marquee" aria-label="Miki Drummer live info">
          <div class="miki-marquee-bar__badge">⚪ Live</div>
          <div class="miki-marquee-bar__track" id="mikiTrack">
            <span style="color:#444">Loading...</span>
          </div>
        </div>

        <script>
        (function () {
          const CITIES = [
            { name: 'Vancouver', flag: '🍁', lat: 49.2827, lon: -123.1207, tz: 'America/Vancouver' },
            { name: 'Ibiza',     flag: '🌴', lat: 38.9067, lon:   1.4206,  tz: 'Europe/Madrid'    }
          ];
          const track = document.getElementById('mikiTrack');
          function getTime(tz) {
            return new Date().toLocaleString('en-GB', { timeZone:tz, weekday:'short', hour:'2-digit', minute:'2-digit', hour12:false });
          }
          async function getWeather(lat, lon, tz) {
            const r = await fetch('https://api.open-meteo.com/v1/forecast?latitude='+lat+'&longitude='+lon+'&current=temperature_2m,weathercode,windspeed_10m&temperature_unit=celsius&wind_speed_unit=kmh&timezone='+encodeURIComponent(tz));
            return (await r.json()).current;
          }
          function wIcon(c) { if(c===0)return'☀️';if(c<=2)return'🌤️';if(c===3)return'☁️';if(c<=49)return'🌫️';if(c<=57)return'🌦️';if(c<=67)return'🌧️';if(c<=77)return'❄️';if(c<=82)return'🌦️';if(c<=86)return'🌨️';if(c<=99)return'⛈️';return'🌡️'; }
          function wDesc(c) { if(c===0)return'Clear';if(c<=2)return'Partly cloudy';if(c===3)return'Overcast';if(c<=49)return'Foggy';if(c<=57)return'Drizzle';if(c<=67)return'Rain';if(c<=77)return'Snow';if(c<=82)return'Showers';if(c<=86)return'Snow showers';if(c<=99)return'Thunderstorm';return'—'; }
          async function fetchNews() {
            try {
              const r = await fetch('news.txt?_='+Date.now());
              const text = await r.text();
              const entries = []; let current = {};
              text.split('\n').forEach(function(line) {
                line = line.trim();
                if(line.startsWith('Title:')) { if(current.title) entries.push(current); current={title:line.replace('Title:','').trim()}; }
                else if(line.startsWith('Description:')) { current.desc=line.replace('Description:','').trim(); }
              });
              if(current.title) entries.push(current);
              return entries;
            } catch(e) { return []; }
          }
          function cityHTML(city, w) {
            const weather = w ? '<span class="miki-city__weather">'+wIcon(w.weathercode)+' '+wDesc(w.weathercode)+' · '+Math.round(w.temperature_2m)+'°C</span>' : '';
            return '<span class="miki-city"><span class="miki-city__flag">'+city.flag+'</span><span class="miki-city__name">'+city.name+'</span><span class="miki-city__time" data-tz="'+city.tz+'">'+getTime(city.tz)+'</span>'+weather+'</span>';
          }
          function familyHTML() {
            return '<span class="miki-family"><span class="miki-family-label">Family</span><a class="miki-family-link" href="https://www.soultonecymbals.com/" target="_blank" rel="noopener"><img class="miki-family-logo miki-family-logo--soultone" src="https://www.soultonecymbals.com/sites/default/files/logo.jpg" alt="Soultone Cymbals" title="Soultone Cymbals" referrerpolicy="no-referrer" loading="lazy"></a><a class="miki-family-link" href="https://woodiesdrumsticks.com/?sca_ref=11339356.SW55dM6yyw&utm_source=ig&utm_medium=social&utm_content=link_in_bio" target="_blank" rel="noopener"><img class="miki-family-logo" src="https://woodiesdrumsticks.com/cdn/shop/files/Woodies_Logo_White-2_73966fa2-99ab-4fa4-8516-a13d5216496f.png?v=1749693953&width=240" alt="Woodies Drumsticks" title="Woodies Drumsticks" referrerpolicy="no-referrer" loading="lazy"></a></span>';
          }
          function newsHTML(entries) {
            if(!entries.length) return '';
            return entries.map(function(e) {
              var desc = e.desc && e.desc!=='TBA' ? ' — '+e.desc : '';
              return '<span class="miki-news-label">📰 News</span><span class="miki-sep">▸</span><span class="miki-news-text">'+e.title+desc+'</span>';
            }).join('<span class="miki-sep">◆</span>');
          }
          async function build() {
            const [weathers, newsEntries] = await Promise.all([
              Promise.all(CITIES.map(function(c){return getWeather(c.lat,c.lon,c.tz).catch(function(){return null;});})),
              fetchNews()
            ]);
            const cities = CITIES.map(function(c,i){return cityHTML(c,weathers[i]);}).join('<span class="miki-divider"></span>');
            const family = familyHTML();
            const news = newsHTML(newsEntries);
            const spacer = news ? '<span class="miki-divider"></span>' : '';
            const block = cities + '<span class="miki-divider"></span>' + family + spacer + news;
            const gap = '<span style="display:inline-block;width:50vw"></span>';
            track.innerHTML = block + gap + block + gap;
            requestAnimationFrame(function() {
              var dur = Math.round(track.scrollWidth / 2 / 80);
              track.style.animationDuration = Math.max(20,dur)+'s';
            });
          }
          build();
          setInterval(function(){ track.querySelectorAll('[data-tz]').forEach(function(el){ el.textContent=getTime(el.dataset.tz); }); }, 30000);
          setInterval(build, 10*60*1000);
        })();
        </script>

        <script>
        fetch('videos.json?_=' + Date.now())
          .then(function(r) { return r.json(); })
          .then(function(data) {
            var allow = 'accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share';

            // Featured video
            var featured = document.getElementById('featuredVideo');
            var fi = document.createElement('iframe');
            fi.width = '100%'; fi.height = '495'; fi.frameBorder = '0';
            fi.allowFullscreen = true; fi.setAttribute('referrerpolicy', 'strict-origin-when-cross-origin');
            fi.allow = allow; fi.title = data.featured.title;
            fi.src = 'https://www.youtube.com/embed/' + data.featured.id + '?playsinline=1';
            featured.appendChild(fi);

            // Sidebar videos
            var sidebar = document.getElementById('sidebarVideos');
            data.sidebar.forEach(function(v) {
              var si = document.createElement('iframe');
              si.width = '100%'; si.height = '100%'; si.frameBorder = '0';
              si.allowFullscreen = true; si.setAttribute('referrerpolicy', 'strict-origin-when-cross-origin');
              si.allow = allow; si.title = v.title;
              si.src = 'https://www.youtube.com/embed/' + v.id + '?playsinline=1';
              sidebar.appendChild(si);
            });
          });
        </script>
